<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>InnoVestrum — Coming Soon</title>
    <meta
      name="description"
      content="InnoVestrum is preparing something new. Reach us at play@innovestrum.com."
    />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #0b0d12;
        --fg: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #7c5cff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fafafa;
          --fg: #18181b;
          --muted: #52525b;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-feature-settings: "ss01", "cv11";
        display: grid;
        place-items: center;
        padding: 6vmin;
        line-height: 1.5;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      .brand {
        font-weight: 700;
        font-size: clamp(2rem, 6vw, 3.25rem);
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      .brand span {
        color: var(--accent);
      }
      .tagline {
        font-size: clamp(1rem, 2.4vw, 1.15rem);
        color: var(--muted);
        margin: 0 0 2rem;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 2rem;
      }
      .status::before {
        content: "";
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 0 rgba(124, 92, 255, 0.6);
        animation: pulse 2.4s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(124, 92, 255, 0.6);
        }
        70% {
          box-shadow: 0 0 0 0.6rem rgba(124, 92, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(124, 92, 255, 0);
        }
      }
      a.contact {
        color: var(--fg);
        border-bottom: 1px dashed var(--muted);
        text-decoration: none;
      }
      a.contact:hover {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      footer {
        margin-top: 2.5rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status">Coming Soon</div>
      <h1 class="brand">Inno<span>Vestrum</span></h1>
      <p class="tagline">
        We're building something worth the wait. Stay tuned.
      </p>
      <p>
        Questions or partnerships?
        <a class="contact" href="mailto:play@innovestrum.com"
          >play@innovestrum.com</a
        >
      </p>
      <footer>© InnoVestrum</footer>
    </main>
  </body>
</html>
